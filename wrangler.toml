name = "oic-website"
compatibility_date = "2026-05-09"

# Keep the workers.dev fallback URL active for now (oic-website.<account>.workers.dev).
# Once the apex domain is configured (see below), flip this to false to make the
# custom domain the only public entry point.
workers_dev = true

# Per-deploy preview URLs (e.g. <hash>.oic-website.<account>.workers.dev).
# Useful for PR previews; flip to false once you want to lock down access.
preview_urls = true

# Pure static site served by Cloudflare Workers Static Assets.
# No Worker script — assets only.
[assets]
directory = "./dist"
not_found_handling = "404-page"

# Once openimages.cloud zone is configured on the same Cloudflare account,
# uncomment to bind the custom domains directly from this config.
# Wrangler will create/manage the DNS records and TLS certs automatically.
#
# [[routes]]
# pattern = "openimages.cloud"
# custom_domain = true
#
# [[routes]]
# pattern = "www.openimages.cloud"
# custom_domain = true
