# Curated catalog of cloud images published by open-img-cloud.
#
# Each entry is enriched at build time by fetching the corresponding
# MANIFEST.json from `IMAGES_BASE_URL` (default: https://images.openimages.cloud).
# When `variants` is set, one MANIFEST-<variant>.json is fetched per variant.
#
# Path scheme on the bucket:
#   <os_name>/<version>/<filename>
#   <os_name>/<version>/MANIFEST.json            (no variant)
#   <os_name>/<version>/MANIFEST-<variant>.json  (with variant)

images:
  - os_name: alpine-linux
    title: Alpine Linux
    tagline: Minimal, security-oriented distro built around musl libc and BusyBox.
    description: |
      Cloud-init-ready, signed Alpine Linux images derived from the upstream
      `nocloud_alpine` cloud release. Two firmware variants (legacy BIOS and
      UEFI) cover both classic OpenStack and modern Proxmox deployments.
    repo: open-img-cloud/alpine-linux
    upstream_homepage: https://www.alpinelinux.org/
    latest_version: "3.23.4"
    format: qcow2
    arch: x86_64
    tags: [openstack, proxmox, cloud-init, signed]
    variants:
      - id: bios
        label: BIOS
        filename_template: "alpine-{version}-bios-x86_64.qcow2"
      - id: uefi
        label: UEFI
        filename_template: "alpine-{version}-uefi-x86_64.qcow2"

  - os_name: amazon-linux-2
    title: Amazon Linux 2
    tagline: AWS's long-term-support base image, derived from the RHEL/CentOS 7 family.
    description: |
      Cloud-init-ready, signed Amazon Linux 2 qcow2 image based on AWS's
      official KVM cloud release. Long-term support window through 2026,
      ideal for keeping legacy AWS-style workloads running on OpenStack
      and Proxmox.
    repo: open-img-cloud/amazon-linux-2
    upstream_homepage: https://aws.amazon.com/amazon-linux-2/
    latest_version: "2.0.20260508.0"
    format: qcow2
    arch: x86_64
    tags: [openstack, proxmox, cloud-init, signed]

  - os_name: amazon-linux-2023
    title: Amazon Linux 2023
    tagline: Fedora-derived AL2023 image — modern dnf-based AWS workhorse.
    description: |
      Cloud-init-ready, signed Amazon Linux 2023 qcow2 image based on
      AWS's official KVM cloud release with kernel 6.1. Faster-moving
      successor to Amazon Linux 2, drop-in for AL2023-targeted workloads
      on OpenStack and Proxmox.
    repo: open-img-cloud/amazon-linux-2023
    upstream_homepage: https://aws.amazon.com/linux/amazon-linux-2023/
    latest_version: "2023.11.20260509.0"
    format: qcow2
    arch: x86_64
    tags: [openstack, proxmox, cloud-init, signed]

  - os_name: alpaquita-linux
    title: Alpaquita Linux
    tagline: Lightweight Alpine-derived distribution from BellSoft, glibc and musl flavors.
    description: |
      Cloud-init-ready, signed Alpaquita Linux images, customized via
      `virt-customize` on top of the upstream BellSoft Stream qcow2.
      Produced in both glibc and musl variants for OpenStack and Proxmox.
    repo: open-img-cloud/alpaquita-linux
    upstream_homepage: https://bell-sw.com/alpaquita-linux/
    latest_version: "2026.04.14"
    format: qcow2
    arch: x86_64
    tags: [openstack, proxmox, cloud-init, signed]
    variants:
      - id: glibc
        label: glibc
        filename_template: "alpaquita-{version}-glibc-x86_64.qcow2"
      - id: musl
        label: musl
        filename_template: "alpaquita-{version}-musl-x86_64.qcow2"

  - os_name: octavia-amphora
    title: Octavia Amphora
    tagline: OpenStack load balancer amphora image, built via diskimage-builder.
    description: |
      Cloud-init-ready, signed Octavia Amphora qcow2 with HAProxy
      pre-installed, built from upstream `openstack/octavia` element
      packs via `diskimage-builder`. Drop-in for a reference Octavia
      deployment on OpenStack.
    repo: open-img-cloud/octavia-amphora
    upstream_homepage: https://docs.openstack.org/octavia/latest/
    latest_version: "2025.2"
    format: qcow2
    arch: x86_64
    tags: [openstack, octavia, dib, signed]
